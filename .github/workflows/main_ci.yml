name: Full-Stack CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package.json
          frontend/package.json

    - name: Build Backend
      run: |
        cd backend
        npm install

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
      env:
        VITE_API_URL: https://placeholder-backend-url.com/api
